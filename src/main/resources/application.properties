spring.application.name=vehicle-inspector
server.port=8080

# PostgreSQL bağlantısı
spring.datasource.url=jdbc:postgresql://localhost:5432/vehicle_inspector
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
application.security.jwt.secret=${JWT_SECRET}
application.security.jwt.expiration=86400000

# File upload
application.storage.upload-dir=uploads

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

application.ai-service.base-url=http://localhost:8000